<template>
    <lightning-card title={title}>
        <template if:true={isAccountSelected}>
            <lightning-button-icon icon-name="utility:adduser" variant="brand" alternative-text="Add Contact" onclick={handleAddContact} aria-haspopup="dialog" ></lightning-button-icon>
            <template if:true={hasContacts}>
                <template for:each={contacts} for:item="contact">
                    <lightning-layout key={contact.Id} class="slds-box slds-m-around_small">
                        <lightning-layout-item size="8">
                            <b>{contact.Name}</b>
                        </lightning-layout-item>
                        <lightning-layout-item size="4" class="slds-text-align_right">
                            <lightning-button-icon icon-name="utility:edit" variant="brand" alternative-text="Edit Contact" onclick={handleEditContact} data-contact-id={contact.Id} aria-haspopup="dialog"></lightning-button-icon>
                            <lightning-button-icon icon-name="utility:delete" variant="destructive" alternative-text="Delete Contact" onclick={handleDeleteContact} data-id={contact.Id}></lightning-button-icon>
                        </lightning-layout-item>
                    </lightning-layout>
                </template>
            </template>
            <template if:false={hasContacts}>
                <div class="slds-text-color_error slds-align_absolute-center">No contacts found.</div>
            </template>
        </template>
        <template if:false={isAccountSelected}>
            <div class="slds-text-color_error slds-align_absolute-center">Please select an account to view contacts.</div>
        </template>
    </lightning-card>
</template>
