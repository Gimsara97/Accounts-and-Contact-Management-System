<template>
    <lightning-modal-header label={header}></lightning-modal-header>
    <lightning-modal-body>
        <lightning-record-edit-form object-api-name="Contact" record-id={recordId} onsuccess={handleSuccess}>
            <lightning-input-field field-name="Name"> </lightning-input-field>
            <lightning-input-field field-name="AccountId" value={accountContactId}> </lightning-input-field>
            <div class="slds-var-m-top_medium">
                <lightning-button variant="brand" type="submit" label="Save"></lightning-button>
            </div>
        </lightning-record-edit-form>
    </lightning-modal-body>
    <lightning-modal-footer>
        <template for:each={options} for:item="option">
            <lightning-button
                key={option.id}
                label={option.label}
                class="slds-button"
                variant={option.variant}
                onclick={handleOptionClick}
                data-id={option.id}
            ></lightning-button>
        </template>
    </lightning-modal-footer>
</template>
